name: PR Validation

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch: # Allow manual trigger

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Nx affected build
        run: npx nx affected -t build --base=origin/main --head=HEAD

      - name: Run Nx affected tests
        run: npx nx affected -t test --base=origin/main --head=HEAD
        continue-on-error: true

      - name: Run Nx affected lint
        run: npx nx affected -t lint --base=origin/main --head=HEAD
        continue-on-error: true

      - name: Build Docker image (validation)
        run: |
          docker build \
            --tag meetjoshi-portfolio:pr-${{ github.event.pull_request.number }} \
            .

      - name: Test Docker image
        run: |
          # Start container in background
          docker run -d \
            --name test-container \
            -p 8080:8080 \
            meetjoshi-portfolio:pr-${{ github.event.pull_request.number }}

          # Wait for container to be ready
          sleep 5

          # Check if container is running
          if docker ps | grep test-container; then
            echo "✅ Container started successfully"
          else
            echo "❌ Container failed to start"
            docker logs test-container
            exit 1
          fi

          # Test HTTP response
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || echo "000")

          if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "304" ]; then
            echo "✅ HTTP health check passed (Status: $HTTP_CODE)"
          else
            echo "❌ HTTP health check failed (Status: $HTTP_CODE)"
            docker logs test-container
            exit 1
          fi

          # Stop container
          docker stop test-container
          docker rm test-container

      - name: Check Docker image size
        run: |
          IMAGE_SIZE=$(docker images meetjoshi-portfolio:pr-${{ github.event.pull_request.number }} --format "{{.Size}}")
          echo "Docker image size: $IMAGE_SIZE"
          echo "📦 **Image Size:** $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY

      - name: Create validation summary
        if: always()
        run: |
          echo "## 🔍 PR Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ All validation checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some validation checks failed. Review the logs." >> $GITHUB_STEP_SUMMARY
          fi
